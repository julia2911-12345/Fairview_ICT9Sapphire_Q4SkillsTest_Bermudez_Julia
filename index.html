<!DOCTYPE html>
<html>
<head>
<title>Virtual Notebook Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

		<style>

		body{
		background:#f8f6ff;
		font-family:Arial;
		}

		.login-box{
		width:350px;
		margin:90px auto;
		background:white;
		padding:30px;
		border-radius:18px;
		box-shadow:0 3px 8px lightgray;
		text-align:center;
		}

		h1{
		color:#6c7aa1;
		}

		p{
		color:#777;
		}

		.login-btn{
		background:#cfdcff;
		}

		.cancel-btn{
		background:#e6dff2;
		}

		a{
		color:#8a7ca8;
		font-size:14px;
		}

		</style>
</head>
<body>

<div class="login-box">

	<h1>Virtual Notebook</h1>

	<p>Student Login</p>

	<input
	type="text"
		id="username"
		class="form-control mb-3"
		placeholder="Username">
	<input
		type="password"
		id="password"
		class="form-control mb-3"
		placeholder="Password">

	<p id="message" style="color:red;"></p>

			<button onclick="login()" class="btn login-btn">
			Login
			</button>
			<button onclick="clearForm()" class="btn cancel-btn">
			Cancel
			</button>

		<br><br>

		<a href="https://support.google.com/accounts/answer/41078"
			target="_blank">
			Forgot Password?
			</a>
</div>

		<script>


		let attempt_counter=0;

		function login(){

		let username=
		document.getElementById("username").value;

		let password=
		document.getElementById("password").value;


		if(username=="admin" && password=="1234"){

		alert("Login Successful!");

		window.location.href="notebooks.html";
		}

		else{

		attempt_counter++;

		document.getElementById("message").innerHTML=
		"Wrong login attempt "
		+ attempt_counter;

		}

		if(attempt_counter>=3){

		alert("Too many attempts.");

		document.getElementById("username").disabled=true;
		document.getElementById("password").disabled=true;

		}
		}

		function clearForm(){

		document.getElementById("username").value="";
		document.getElementById("password").value="";
		}

		</script>

</body>
</html>
