<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Q4 Skills Test</title>

	    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body>

<script>
do {
        
        if (username === "" && pwd === "") {
            alert();
            attempt_counter = 0; // reset after success
            document.getElementById("").innerHTML = "";
            window.location.href = "notebooks.html"; //go to second page
            break; // stop loop
        } else {
            attempt_counter++;
            document.getElementById("display").innerHTML =
                "Incorrect username and/or password. Attempt " + attempt_counter + " of 3 ";
        }

    } while (false); 

    if (attempt_counter >= 3) {
        alert();
        document.getElementById("").disabled = true; // lock button
    }
</script>

<script>
// for Logout with cancel option

function logout() {
            let confirmLogout = confirm("Exit now?"); //confirm() has 2 options : ok (True) and cancel(False)
            
            if (confirmLogout) { //if ok or True
                window.location.href = "index.html"; //load page
            }
        }
</script>


</body>
</html>
