<!DOCTYPE html>
<html>
<head>
<title>Student Login</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
background:#eaf2ff;
font-family:Arial;
}

.login-box{
width:350px;
margin:80px auto;
background:white;
padding:30px;
border-radius:20px;
box-shadow:0px 0px 10px gray;
text-align:center;
}

h1{
color:navy;
}

.footer{
margin-top:20px;
font-size:12px;
}
</style>

</head>
<body>

<div class="login-box">

<h1>Virtual Notebook Login</h1>

<p>Enter your username and password.</p>

<input type="text" id="username" class="form-control mb-3" placeholder="Username">

<input type="password" id="password" class="form-control mb-3" placeholder="Password">

<p id="message" style="color:red;"></p>

<button onclick="login()" class="btn btn-primary">
Login
</button>

<button onclick="clearForm()" class="btn btn-secondary">
Cancel
</button>

<div class="footer">
<a href="https://www.w3schools.com/" target="_blank">
Visit W3Schools
</a>
</div>

</div>

<script>

//variables
let attempt_counter=0;

//function for login
function login(){

let username=
document.getElementById("username").value;

let password=
document.getElementById("password").value;

/*
sample username:
admin
sample password:
1234
*/

do{

if(username=="admin" && password=="1234"){

alert("Login Successful!");

attempt_counter=0;

document.getElementById("message").innerHTML="";

window.location.href="notebooks.html";

break;

}

else{

attempt_counter++;

document.getElementById("message").innerHTML=
"Wrong login! Attempt "
+ attempt_counter +
" of 3";

}

}
while(false);


//conditional statement
if(attempt_counter>=3){

alert("Too many attempts!");

document.getElementById("username").disabled=true;
document.getElementById("password").disabled=true;

}

}


//event function
function clearForm(){
document.getElementById("username").value="";
document.getElementById("password").value="";
}


//output example using calculation
let subjects=6;
let notebooks=subjects*1;

document.write(
"<center>Total notebooks prepared: "
+ notebooks +
"</center>"
);

</script>

</body>
</html>
